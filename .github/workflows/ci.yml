name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # 1. Test
  # -------------------------------------------------------------------------
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run python -m pytest -q

  # -------------------------------------------------------------------------
  # 2. Bump
  # -------------------------------------------------------------------------
  bump:
    name: Bump version
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --extra dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch
        id: bump
        run: |
          uv run bump-my-version bump patch --allow-dirty --tag --tag-name "v{new_version}"
          echo "version=$(uv run bump-my-version show current_version)" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin --tags

  # -------------------------------------------------------------------------
  # 3. Build
  # -------------------------------------------------------------------------
  build:
    name: Build
    needs: bump
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --extra dev

      - name: Build
        run: uv build

      - name: Check package metadata
        run: uv run twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*

  # -------------------------------------------------------------------------
  # 4a. Release — parallel after build
  # -------------------------------------------------------------------------
  release:
    name: Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    environment: github-releases

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump.outputs.version }}
        run: |
          gh release create "v${VERSION}" dist/* \
            --repo "${REPO}" \
            --title "v${VERSION}" \
            --generate-notes

  # -------------------------------------------------------------------------
  # 4b. Docs — parallel after build
  # -------------------------------------------------------------------------
  docs:
    name: Docs
    needs: [bump, build]
    runs-on: ubuntu-latest
    continue-on-error: true  # remove once GitHub Pages is enabled
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --extra dev

      - run: uv run pdoc -o docs/api src/pysaj

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/api

      - uses: actions/deploy-pages@v5
        id: deployment

  # -------------------------------------------------------------------------
  # 4c. PyPI — parallel after build, waits for manual approval
  #     Configure environment "pypi" with a required reviewer in GitHub to
  #     gate the publish step.
  # -------------------------------------------------------------------------
  pypi:
    name: Publish to PyPI
    needs: [bump, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
